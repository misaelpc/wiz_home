<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Taildash - Tailwind CSS Admin Dashboard Template</title>
  </head>
  <body
    x-data="{ page: 'login', 'loaded': true, 'darkMode': true, 'stickyMenu': false, 'sidebarToggle': false, 'scrollTop': false }"
    x-init="
         darkMode = JSON.parse(localStorage.getItem('darkMode'));
         $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark text-bodydark bg-boxdark-2': darkMode === true}"
  >
    <!-- ===== Preloader Start ===== -->
    <include src="./partials/preloader.html"></include>
    <!-- ===== Preloader End ===== -->

    <!-- ===== Page Wrapper Start ===== -->
    <div class="overflow-hidden">
      <!-- ===== Sidebar Start ===== -->
      <include src="./partials/sidebar.html"></include>
      <!-- ===== Sidebar End ===== -->

      <!-- ===== Header Start ===== -->
      <include src="./partials/header.html" />
      <!-- ===== Header End ===== -->

      <!-- ===== Main Content Start ===== -->
      <main class="lg:pl-72.5 pt-26 lg:pt-22.5">
        <div class="p-4 md:p-6 2xl:p-11">
          <!-- ====== Forms Section Start -->
          <div class="mx-auto shadow-1 rounded-lg bg-white dark:bg-boxdark">
            <div class="flex flex-wrap items-stretch">
              <div class="w-full lg:w-1/2">
                <div
                  class="w-full py-14 px-6 sm:p-17.5 sm:px-12 xl:px-22.5"
                >
                  <h2
                    class="mb-10 font-bold text-title-xl text-black dark:text-white"
                  >
                    Log In
                  </h2>
                  <form>
                    <div class="mb-6.5">
                      <label class="mb-3 block">Email Address</label>
                      <input
                        type="email"
                        class="w-full rounded-md border border-stroke dark:border-strokedark bg-transparent py-3 px-3.5 outline-none focus:border-primary dark:focus:border-primary focus-visible:shadow-none"
                      />
                    </div>
                    <div class="mb-6.5">
                      <label class="mb-3 block">Your Password</label>
                      <input
                        type="password"
                        class="w-full rounded-md border border-stroke dark:border-strokedark bg-transparent py-3 px-3.5 outline-none focus:border-primary dark:focus:border-primary focus-visible:shadow-none"
                      />
                    </div>
                    <div class="mb-6.5">
                      <input
                        type="submit"
                        value="Log In"
                        class="w-full cursor-pointer rounded-md border border-primary bg-primary py-3 px-3.5 text-white transition hover:bg-opacity-90"
                      />
                    </div>
                  </form>
                  <div class="flex flex-wrap justify-between">
                    <a
                      href="#"
                      class="mb-2 mr-2 inline-block hover:text-primary hover:underline"
                    >
                      Forget Password?
                    </a>
                    <p class="mb-2">
                      Not a member yet?
                      <a
                        href="signup.html"
                        class="text-primary hover:underline"
                      >
                        Register
                      </a>
                    </p>
                  </div>
                </div>
              </div>
              <div class="w-full lg:w-1/2">
                <div
                  class="relative h-full w-full rounded-br-lg rounded-tr-lg overflow-hidden bg-primary"
                >
                  <div class="flex h-full items-end p-8 sm:p-14">
                    <h3 class="text-2xl font-bold text-white">
                      Hey <br />
                      Welcome <br />
                      Back
                    </h3>
                    <div>
                      <span class="absolute left-0 top-0">
                        <svg
                          width="415"
                          height="355"
                          viewBox="0 0 415 355"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <path
                            d="M415 107.5C415 244.19 304.19 355 167.5 355C30.8095 355 -80 244.19 -80 107.5C-80 -29.1905 30.8095 -140 167.5 -140C304.19 -140 415 -29.1905 415 107.5Z"
                            fill="url(#paint0_linear_1179_8)"
                          />
                          <defs>
                            <linearGradient
                              id="paint0_linear_1179_8"
                              x1="167.5"
                              y1="-140"
                              x2="167.5"
                              y2="355"
                              gradientUnits="userSpaceOnUse"
                            >
                              <stop
                                offset="0.177083"
                                stop-color="white"
                                stop-opacity="0.16"
                              />
                              <stop
                                offset="1"
                                stop-color="white"
                                stop-opacity="0"
                              />
                            </linearGradient>
                          </defs>
                        </svg>
                      </span>
                      <span class="absolute top-0 left-0">
                        <svg
                          width="177"
                          height="354"
                          viewBox="0 0 177 354"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <path
                            d="M177 177C177 274.754 97.7544 354 0 354C-97.7544 354 -177 274.754 -177 177C-177 79.2456 -97.7544 0 0 0C97.7544 0 177 79.2456 177 177Z"
                            fill="url(#paint0_linear_1179_7)"
                          />
                          <defs>
                            <linearGradient
                              id="paint0_linear_1179_7"
                              x1="0"
                              y1="0"
                              x2="0"
                              y2="354"
                              gradientUnits="userSpaceOnUse"
                            >
                              <stop
                                offset="0.177083"
                                stop-color="white"
                                stop-opacity="0.2"
                              />
                              <stop
                                offset="1"
                                stop-color="white"
                                stop-opacity="0"
                              />
                            </linearGradient>
                          </defs>
                        </svg>
                      </span>
                      <span class="absolute bottom-16 right-20">
                        <svg
                          width="85"
                          height="85"
                          viewBox="0 0 85 85"
                          fill="none"
                          xmlns="http://www.w3.org/2000/svg"
                        >
                          <path
                            d="M42.5 -1.85773e-06C65.9721 -2.88373e-06 85 19.0279 85 42.5C85 65.9721 65.9721 85 42.5 85C19.0279 85 -8.31736e-07 65.9721 -1.85773e-06 42.5C-2.88373e-06 19.0279 19.0279 -8.31736e-07 42.5 -1.85773e-06Z"
                            fill="url(#paint0_linear_1179_6)"
                          />
                          <defs>
                            <linearGradient
                              id="paint0_linear_1179_6"
                              x1="-1.85774e-06"
                              y1="42.5"
                              x2="85"
                              y2="42.5"
                              gradientUnits="userSpaceOnUse"
                            >
                              <stop
                                offset="0.177083"
                                stop-color="white"
                                stop-opacity="0.16"
                              />
                              <stop
                                offset="1"
                                stop-color="white"
                                stop-opacity="0"
                              />
                            </linearGradient>
                          </defs>
                        </svg>
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- ====== Forms Section End -->
        </div>
      </main>
      <!-- ===== Main Content End ===== -->
    </div>
    <!-- ===== Page Wrapper End ===== -->

    <!-- ====== Back To Top Start ===== -->
    <include src="./partials/scrolltop.html" />
    <!-- ====== Back To Top End ===== -->
  </body>
</html>
